    <script>
        function agendarCita() {
           
            var cedula = document.getElementById('cedula').value;
            var nombre = document.getElementById('nombre').value;
            var apellido = document.getElementById('apellido').value;
            var telefono = document.getElementById('telefono').value;
            var direccion = document.getElementById('direccion').value;
            var servicio = document.getElementById('servicio').value;
            var doctor = document.getElementById('doctor').value;
            var fecha = document.getElementById('fecha').value;
            var hora = document.getElementById('hora').value;
            
            if (!cedula || !nombre || !apellido || !servicio || !doctor || !fecha || !hora) {
                alert('Por favor complete todos los campos obligatorios (*)');
                return;
            }
            
            var mensaje = "Resumen de tu cita\n\n" +
                         "Datos personales:\n" +
                         "    Cédula: " + cedula + "\n" +
                         "    Nombre: " + nombre + " " + apellido + "\n" +
                         "    Teléfono: " + (telefono || "No especificado") + "\n" +
                         "    Direccion: " + (direccion || "No especificado") + "\n\n" +

                         "Detalles de la cita:\n" +
                         "    Servicio: " + servicio + "\n" +
                         "    Doctor: " + doctor + "\n" +
                         "    Fecha: " + fecha + "\n" +
                         "    Hora: " + hora + "\n\n" +

                         "✅ ¿Confirmar la reservación de esta cita?";
            
            if (confirm(mensaje)) {
                alert("¡Cita agendada exitosamente!\n\nNos comunicaremos contigo para confirmar los detalles.\n\nFundación Divino Niño - ¡Servimos con amor!");
            }
        }
    </script>
